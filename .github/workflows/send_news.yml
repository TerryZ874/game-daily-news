name: Generate Game Industry Daily News

on:
  schedule:
    # 23:00 UTC = 07:00 Beijing (UTC+8)
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  generate-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch news and write markdown
        run: python send_news.py

      - name: Commit and push news file
        run: |
          git config user.name "game-daily-news-bot"
          git config user.email "bot@game-daily-news"
          git add news/
          git diff --cached --quiet || git commit -m "daily news digest $(date +'%Y-%m-%d')"
          git push
